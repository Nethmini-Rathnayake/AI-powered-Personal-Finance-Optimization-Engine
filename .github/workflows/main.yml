name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Security scan — static analysis (Bandit)
        run: bandit -r src/ -ll

      - name: Security scan — dependency vulnerabilities (Safety)
        run: safety check --full-report
        continue-on-error: true   # advisory; never hardblock on transitive vulns

  docker-build:
    name: Build & Smoke-test Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t finops-engine:${{ github.sha }} .

      - name: Smoke-test /health endpoint
        run: |
          docker run -d --name finops_smoke \
            -e ANTHROPIC_API_KEY=dummy \
            -p 8000:8000 \
            finops-engine:${{ github.sha }}
          sleep 6
          curl --fail --retry 3 --retry-delay 2 http://localhost:8000/health
          docker stop finops_smoke
